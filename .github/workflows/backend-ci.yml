name: Backend CI

# Lint + Jest tests for the Node.js backend.
# Runs on every push/PR; deployment preview is handled by Railway's
# native GitHub integration (configure in Railway dashboard).

on:
  push:
    branches: ['**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  # ── ESLint ─────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run ESLint
        run: npm run lint
        working-directory: backend

  # ── i18n Syntax Check ───────────────────────────────────────────────────────
  i18n:
    name: i18n syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check i18n.js syntax
        run: node --check backend/public/shared/i18n.js

  # ── Jest + Supertest ────────────────────────────────────────────────────────
  jest:
    name: Jest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run Jest tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
          # No DATABASE_URL → backend falls back to file storage (mocked in tests)

  # ── Railway Preview Deploy ──────────────────────────────────────────────────
  preview:
    name: Deploy preview to Railway
    runs-on: ubuntu-latest
    needs: [lint, jest]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy preview environment
        id: deploy
        continue-on-error: true
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --environment pr-${{ github.event.number }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Comment preview URL on PR
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚂 Railway preview deployed for PR #${{ github.event.number }}. Check the Railway dashboard for the preview URL.'
            })
