<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0f14; color:#e0e0e0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; overflow:hidden; }
.container { width:778px; height:500px; margin:0 auto; position:relative; display:flex; align-items:center; justify-content:center; }

/* Dashboard mockup */
.dashboard { background:#16172a; border-radius:12px; width:680px; padding:24px; border:1px solid #2a2b40; }
.dash-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.dash-title { font-size:18px; font-weight:700; }
.dash-subtitle { font-size:12px; color:#888; margin-top:2px; }
.btn-primary { background:#7c3aed; color:#fff; border:none; padding:8px 18px; border-radius:8px; font-size:13px; cursor:pointer; font-weight:600; }

/* Entity grid */
.entity-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.entity-card { background:#1e1f36; border:1px solid #2a2b40; border-radius:10px; padding:16px; text-align:center; transition:all 0.3s; min-height:140px; position:relative; }
.entity-card.empty { border-style:dashed; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.entity-card.empty:hover { border-color:#7c3aed; }
.entity-avatar { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 8px; }
.entity-name { font-weight:600; font-size:14px; margin-bottom:4px; }
.entity-model { font-size:11px; color:#888; }
.entity-status { display:inline-block; width:8px; height:8px; border-radius:50%; background:#4ade80; margin-right:4px; }
.entity-offline { background:#666; }
.entity-add-icon { font-size:32px; color:#555; margin-bottom:8px; }
.entity-add-text { font-size:12px; color:#888; }

/* Modal */
.modal-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; border-radius:12px; z-index:10; }
.modal-overlay.show { display:flex; }
.modal { background:#1e1f36; border:1px solid #2a2b40; border-radius:12px; width:400px; padding:24px; }
.modal h2 { font-size:16px; font-weight:700; margin-bottom:16px; }
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:12px; color:#aaa; margin-bottom:4px; font-weight:500; }
.form-input { width:100%; background:#16172a; border:1px solid #2a2b40; border-radius:6px; padding:8px 12px; color:#e0e0e0; font-size:13px; }
.form-select { width:100%; background:#16172a; border:1px solid #2a2b40; border-radius:6px; padding:8px 12px; color:#e0e0e0; font-size:13px; appearance:auto; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
.btn-cancel { background:#2a2b40; color:#ccc; border:none; padding:8px 16px; border-radius:6px; font-size:13px; cursor:pointer; }

/* Success state */
.success-card { border-color:#4ade80 !important; box-shadow:0 0 20px rgba(74,222,128,0.15); }
.success-badge { position:absolute; top:-6px; right:-6px; background:#4ade80; color:#000; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; }

/* Toast */
.toast { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:#4ade80; color:#000; padding:10px 24px; border-radius:8px; font-size:13px; font-weight:600; display:none; z-index:20; }
.toast.show { display:block; }

.frame-indicator { position:absolute; bottom:6px; right:10px; font-size:10px; color:#555; background:#16172a; padding:3px 8px; border-radius:4px; }
</style>
</head>
<body>
<div class="container" id="root">
    <div class="dashboard">
        <div class="dash-header">
            <div>
                <div class="dash-title">My Entities</div>
                <div class="dash-subtitle">Manage your AI agents</div>
            </div>
            <button class="btn-primary" id="btnAdd">+ New Agent</button>
        </div>
        <div class="entity-grid" id="entityGrid">
            <div class="entity-card">
                <div class="entity-avatar" style="background:#2d1b69">🦞</div>
                <div class="entity-name"><span class="entity-status"></span>LOBSTER</div>
                <div class="entity-model">Claude 3.5 Sonnet</div>
            </div>
            <div class="entity-card">
                <div class="entity-avatar" style="background:#1b3a69">🔧</div>
                <div class="entity-name"><span class="entity-status"></span>BackendOps</div>
                <div class="entity-model">GPT-4o</div>
            </div>
            <div class="entity-card empty" id="slot3">
                <div class="entity-add-icon">+</div>
                <div class="entity-add-text">Add Agent</div>
            </div>
            <div class="entity-card empty">
                <div class="entity-add-icon">+</div>
                <div class="entity-add-text">Add Agent</div>
            </div>
            <div class="entity-card empty">
                <div class="entity-add-icon">+</div>
                <div class="entity-add-text">Add Agent</div>
            </div>
            <div class="entity-card empty">
                <div class="entity-add-icon">+</div>
                <div class="entity-add-text">Add Agent</div>
            </div>
        </div>
    </div>

    <!-- Create Agent Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>🤖 Create New Agent</h2>
            <div class="form-group">
                <label class="form-label">Agent Name</label>
                <input class="form-input" id="agentName" value="" placeholder="e.g. SalesBot">
            </div>
            <div class="form-group">
                <label class="form-label">Model</label>
                <select class="form-select" id="agentModel">
                    <option>Claude 3.5 Sonnet</option>
                    <option selected>GPT-4o</option>
                    <option>MiniMax 2.1 (Free)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Role Description</label>
                <input class="form-input" id="agentRole" value="" placeholder="e.g. Handles customer support">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel">Cancel</button>
                <button class="btn-primary" id="btnCreate">Create Agent</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">✅ Agent "ContentPro" created successfully!</div>
    <div class="frame-indicator" id="frameLabel"></div>
</div>
</body>
</html>
